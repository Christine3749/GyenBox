  <rect class="bg" width="1600" height="980"/>
  <text x="80" y="62" class="caption">GyenBox Desktop Redesign Preview</text>
  <text x="80" y="88" class="sub">Same product language, two density profiles. Home is list-first, not dashboard-first.</text>

