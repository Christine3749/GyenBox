<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151719"/>
      <stop offset="1" stop-color="#101214"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2824"/>
      <stop offset="1" stop-color="#211f1b"/>
    </linearGradient>
    <style>
      .bg { fill:#0d0f11; }
      .caption { fill:#e9e4da; font:700 24px 'Segoe UI',Arial,sans-serif; }
      .sub { fill:#a7a19a; font:500 14px 'Segoe UI',Arial,sans-serif; }
      .panel { fill:url(#paper); stroke:rgba(255,255,255,.18); stroke-width:1.3; }
      .rail { fill:url(#rail); }
      .line { stroke:rgba(255,255,255,.12); stroke-width:1; }
      .ink { fill:#f4f0e8; font-family:'Segoe UI',Arial,sans-serif; }
      .muted { fill:#bdb7ae; font-family:'Segoe UI',Arial,sans-serif; }
      .faint { fill:#8f8982; font-family:'Segoe UI',Arial,sans-serif; }
      .mono { fill:#8fa0ff; font:800 12px 'Cascadia Mono','Consolas',monospace; letter-spacing:.2px; }
      .search { fill:#24231f; }
      .tab { fill:#f4f0e8; font:800 17px 'Segoe UI',Arial,sans-serif; }
      .tab-muted { fill:#bcb5ad; font:700 17px 'Segoe UI',Arial,sans-serif; }
      .section { fill:#a7a19a; font:800 15px 'Segoe UI',Arial,sans-serif; }
      .title { fill:#f4f0e8; font:700 17px 'Segoe UI',Arial,sans-serif; }
      .meta { fill:#b8b1a8; font:500 13px 'Segoe UI',Arial,sans-serif; }
      .status { fill:#f4f0e8; font:800 16px 'Segoe UI',Arial,sans-serif; }
      .blue { stroke:#6f8fff; }
      .blueFill { fill:#6f8fff; }
      .good { fill:#84ae8b; }
      .folder { fill:#f7c84e; stroke:#d5a931; stroke-width:1; }
      .file { fill:#e9e4da; stroke:#c9c1b6; stroke-width:1; }
      .iconLine { fill:none; stroke:#d7d0c7; stroke-width:2.3; stroke-linecap:round; stroke-linejoin:round; }
      .smallIcon { fill:none; stroke:#d7d0c7; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
      .note { fill:#bdb7ae; font:500 14px 'Segoe UI',Arial,sans-serif; }
      .brandBox { fill:#fffdf9; stroke:#c8c1b8; stroke-width:1; }
      .brandCore { fill:#fffdf9; stroke:#5f74c4; stroke-width:1.8; }
      .brandTop { fill:#e7eaf5; stroke:#1a1a1a; stroke-opacity:.5; stroke-width:1.2; }
      .brandSideA { fill:#f4f2ee; stroke:#1a1a1a; stroke-opacity:.38; stroke-width:1.2; }
      .brandSideB { fill:#dde3f4; stroke:#1a1a1a; stroke-opacity:.38; stroke-width:1.2; }
    </style>
