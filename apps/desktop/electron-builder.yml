appId: com.gyenbox.desktop
productName: GyenBox
copyright: Copyright (c) 2026 GyenBox

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  - "!src/**/*"
  - "!scripts/**/*"
  - "!tsconfig.json"
  - "!tsconfig.tsbuildinfo"

extraResources:
  - from: ../../target/release/gyenbox-sync.exe
    to: bin/gyenbox-sync.exe
  - from: ../../target/release/gyenbox-folder-launcher.exe
    to: bin/gyenbox-folder-launcher.exe
  - from: ../../target/release/gyenbox_shell.dll
    to: bin/gyenbox-shell.dll
  - from: build/icon.ico
    to: icon.ico
  - from: build/overlay-synced.ico
    to: overlay-synced.ico
  - from: build/icon.png
    to: icon.png
  - from: build/tray-icon.png
    to: tray-icon.png
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: GyenBox-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GyenBox
  # The Rust bootstrapper shell launches GyenBox after the silent /S install so it
  # can pass GYENBOX_BOOTSTRAP_DIR for the seamless handoff. Let it be the only
  # launcher -- auto-run here would create a second instance with no handoff env.
  runAfterFinish: false
