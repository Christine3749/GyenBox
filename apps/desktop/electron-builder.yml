appId: com.gyenbox.desktop
productName: GyenBox
copyright: Copyright (c) 2026 GyenBox

directories:
  output: release

files:
  - dist/**/*
  - package.json
  - "!src/**/*"
  - "!scripts/**/*"
  - "!tsconfig.json"
  - "!tsconfig.tsbuildinfo"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: GyenBox-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GyenBox
  runAfterFinish: true
